# Installation Configuration
version: "1.0.0"

# System Requirements
requirements:
  cpu:
    min: 2
    recommended: 4
  memory:
    min_gb: 4
    recommended_gb: 8
  disk:
    min_gb: 50
    recommended_gb: 100

# Network Configuration
network:
  ports:
    http: 80
    mqtt: 1883
    kafka: 9092
  allow_port_change: true

# Docker Configuration
docker:
  required_version: "20.10.0"
  images:
    - name: "confluentinc/cp-kafka"
      tag: "latest"
    - name: "confluentinc/ksqldb-server"
      tag: "latest"
    - name: "ghcr.io/nsubrahm/mysql"
      tag: "latest"
    - name: "ghcr.io/nsubrahm/mosquitto"
      tag: "latest"

# Installation Phases
phases:
  - id: "check"
    name: "System Check"
    rollback_supported: false
    
  - id: "config"
    name: "Configuration Setup"
    rollback_supported: true
    backup_required: true
    
  - id: "docker"
    name: "Docker Setup"
    rollback_supported: true
    
  - id: "deploy"
    name: "Service Deployment"
    rollback_supported: true
    
  - id: "verify"
    name: "Final Verification"
    rollback_supported: false
