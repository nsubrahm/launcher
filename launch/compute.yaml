version: '3.5'

services:
  alarms:
    container_name: ${COMPOSE_PROJECT_NAME}-alarms-${MACHINE_ID:-M001}
    image: ${CONTAINER_REPOSITORY}/alarms:${ALARMS_TAG:-latest}
    env_file:
      - ./conf/common.env
      - ./conf/alarms.env
    network_mode: "host"
    healthcheck:
      test: /work/health
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 10s

  alerts:
    container_name: ${COMPOSE_PROJECT_NAME}-alerts-${MACHINE_ID:-M001}
    image: ${CONTAINER_REPOSITORY}/alerts:${ALERTS_TAG:-latest}
    env_file:
      - ./conf/common.env
      - ./conf/alerts.env
    network_mode: "host"
    healthcheck:
      test: /work/health
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 10s

  merger:
    container_name: ${COMPOSE_PROJECT_NAME}-merger-${MACHINE_ID:-M001}
    image: ${CONTAINER_REPOSITORY}/merger:${MERGER_TAG:-latest}
    depends_on:
      alarms:
        condition: service_healthy
      alerts:
        condition: service_healthy
    env_file:
      - ./conf/common.env
      - ./conf/merger.env
    network_mode: "host"
    healthcheck:
      test: /work/health
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 10s

  events:
    container_name: ${COMPOSE_PROJECT_NAME}-events-${MACHINE_ID:-M001}
    image: ${CONTAINER_REPOSITORY}/streamer:${STREAMER_TAG:-latest}
    depends_on:
      merger:
        condition: service_healthy
    env_file:
      - ./conf/common.env
      - ./conf/events.env
    network_mode: "host"
    healthcheck:
      test: /work/health
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 10s
