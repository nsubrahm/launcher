version: '3.5'

services:
  broker:
    container_name: ${COMPOSE_PROJECT_NAME}-broker
    image: confluentinc/cp-kafka:${KAFKA_TAG:-7.5.2}
    env_file:
      - ./conf/common.env
      - ./conf/broker.env
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 2s
      timeout: 30s
      retries: 3
      start_period: 10s
    networks:
      - broker

networks:
  broker:
    name: broker